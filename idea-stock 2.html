<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IdeaStock</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hiragino Sans', 'Noto Sans JP', 'Meiryo', sans-serif; background: #F7F9FC; }
    input::placeholder, textarea::placeholder { color: #B0BCC8; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #DDE4EE; border-radius: 3px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    @keyframes fadeInFast { from { opacity: 0; } to { opacity: 1; } }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useRef, useEffect, useCallback } = React;

// ── Supabase ──────────────────────────────────────────────────────
const SUPABASE_URL = "https://feumaclpqrhrmrimsfhq.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZldW1hY2xwcXJocm1yaW1zZmhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMTY0MTUsImV4cCI6MjA5NjU5MjQxNX0.zvo8bUerye6pHL5RwLdvZD3odZjf7DI1jAgGd3RSdSQ";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── Constants ─────────────────────────────────────────────────────
const COLORS = ["#4A90D9","#E8734A","#52B788","#9B72CF","#E8A838","#E85D75","#3AAFA9"];
const AVATARS = ["🧑","👩","🧔","👨‍💻","👩‍💼","🧑‍🎨","👨‍🔬","👩‍🚀"];
const AVATAR_COLORS = ["#4A90D9","#52B788","#E8734A","#9B72CF","#E8A838","#E85D75","#3AAFA9","#F06595"];
const SK_SESSION = "ideastock_session_v6";

const store = {
  get: (k, fb) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch { return fb; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

function formatDateTime(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleDateString("ja-JP",{month:"numeric",day:"numeric"}) + " " + d.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
  } catch { return iso; }
}
function tokenFromId(id) { return btoa(unescape(encodeURIComponent(id))).replace(/=/g,""); }
function idFromToken(tok) { try { return decodeURIComponent(escape(atob(tok))); } catch { return null; } }
function getInviteLink(inviteId) {
  return window.location.href.split("?")[0] + "?invite=" + tokenFromId(inviteId);
}

// ── UI Atoms ──────────────────────────────────────────────────────
function Avatar({ user, size=28, ring=false }) {
  if (!user) return null;
  return (
    <div title={user.name} style={{
      width:size, height:size, borderRadius:"50%",
      background:(user.color||"#999")+"28",
      border: ring ? `2.5px solid ${user.color}` : "2px solid #fff",
      display:"flex", alignItems:"center", justifyContent:"center",
      fontSize:size*0.48, flexShrink:0, cursor:"default", userSelect:"none"
    }}>{user.avatar}</div>
  );
}

function TagBadge({ tag, onRemove, small }) {
  return (
    <span style={{ display:"inline-flex", alignItems:"center", gap:4,
      padding: small?"2px 8px":"3px 10px", background:"#F0F4F8", color:"#4A6080",
      borderRadius:20, fontSize:small?11:12, fontWeight:500, border:"1px solid #DDE4EE" }}>
      {tag}
      {onRemove && <button onClick={onRemove} style={{background:"none",border:"none",cursor:"pointer",padding:0,color:"#8898AA",lineHeight:1,fontSize:13}}>×</button>}
    </span>
  );
}

function Spinner() {
  return <div className="spin" style={{width:20,height:20,border:"2px solid #DDE4EE",borderTopColor:"#4A90D9",borderRadius:"50%"}}/>;
}

const inputStyle = {
  display:"block", width:"100%", padding:"9px 13px",
  border:"1.5px solid #DDE4EE", borderRadius:8, fontSize:14,
  outline:"none", boxSizing:"border-box", fontFamily:"inherit",
  transition:"border-color .15s", color:"#1A2840", background:"#fff"
};

// ── ImageUploadZone ───────────────────────────────────────────────
function ImageUploadZone({ images, onChange }) {
  const ref = useRef();
  const [drag, setDrag] = useState(false);
  const process = useCallback(files => {
    [...files].filter(f=>f.type.startsWith("image/")).forEach(f=>{
      const r = new FileReader();
      r.onload = e => onChange(p=>[...p,{id:Date.now()+Math.random(),src:e.target.result,name:f.name}]);
      r.readAsDataURL(f);
    });
  },[onChange]);
  return (
    <div>
      <label style={{fontSize:11,fontWeight:700,color:"#6B7A90",letterSpacing:".06em",textTransform:"uppercase"}}>画像</label>
      <div onDragOver={e=>{e.preventDefault();setDrag(true)}} onDragLeave={()=>setDrag(false)}
        onDrop={e=>{e.preventDefault();setDrag(false);process(e.dataTransfer.files)}}
        onClick={()=>ref.current.click()}
        style={{marginTop:6,padding:"16px",border:`2px dashed ${drag?"#4A90D9":"#DDE4EE"}`,
          borderRadius:10,cursor:"pointer",textAlign:"center",background:drag?"#EEF6FF":"#F7F9FC",transition:"all .15s"}}>
        <div style={{fontSize:22,marginBottom:4}}>📷</div>
        <p style={{margin:0,fontSize:12,color:"#8898AA"}}>クリックまたはドラッグ＆ドロップ</p>
        <input ref={ref} type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>process(e.target.files)}/>
      </div>
      {images.length>0&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:10}}>
          {images.map(img=>(
            <div key={img.id} style={{position:"relative",width:68,height:68}}>
              <img src={img.src} alt="" style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:8,border:"1.5px solid #DDE4EE"}}/>
              <button onClick={()=>onChange(p=>p.filter(i=>i.id!==img.id))} style={{
                position:"absolute",top:-6,right:-6,width:18,height:18,
                background:"#E85D75",color:"#fff",border:"none",borderRadius:"50%",
                cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Lightbox ──────────────────────────────────────────────────────
function Lightbox({ src, onClose }) {
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:500,
      display:"flex",alignItems:"center",justifyContent:"center",cursor:"zoom-out"}}>
      <img src={src} alt="" style={{maxWidth:"90vw",maxHeight:"90vh",borderRadius:10}}/>
    </div>
  );
}

// ── JoinScreen ────────────────────────────────────────────────────
function JoinScreen({ inviteId, onJoin }) {
  const [name, setName] = useState("");
  const [err, setErr]   = useState("");
  const [loading, setLoading] = useState(false);

  const join = async () => {
    if (!name.trim()) { setErr("名前を入力してください"); return; }
    setLoading(true);
    const avatar = AVATARS[Math.floor(Math.random()*AVATARS.length)];
    const color  = AVATAR_COLORS[Math.floor(Math.random()*AVATAR_COLORS.length)];
    const id = "u" + Date.now();
    const { error: me } = await sb.from("members").insert({ id, name:name.trim(), avatar, color, role:"member" });
    if (me) { setErr("エラーが発生しました"); setLoading(false); return; }
    await sb.from("invites").update({ status:"used" }).eq("id", inviteId);
    store.set(SK_SESSION, id);
    onJoin();
  };

  return (
    <div style={{minHeight:"100vh",background:"#F7F9FC",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:20,padding:"40px 36px",width:"min(95vw,380px)",
        boxShadow:"0 20px 60px rgba(0,0,0,0.1)",animation:"fadeIn .3s ease",display:"flex",flexDirection:"column",gap:20}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:36,height:36,background:"#1A2840",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>💡</div>
          <div>
            <div style={{fontWeight:800,fontSize:17,color:"#1A2840"}}>IdeaStock</div>
            <div style={{fontSize:11,color:"#8898AA"}}>ワークスペースへ招待されました</div>
          </div>
        </div>
        <div style={{background:"#EEF6FF",borderRadius:10,padding:"12px 14px"}}>
          <p style={{margin:0,fontSize:13,color:"#4A6080",lineHeight:1.6}}>
            <span style={{fontWeight:700,color:"#4A90D9"}}>招待リンクを確認しました ✓</span><br/>
            名前を入力して参加しましょう。
          </p>
        </div>
        <div>
          <label style={{fontSize:11,fontWeight:700,color:"#6B7A90",letterSpacing:".06em",textTransform:"uppercase"}}>あなたの名前</label>
          <input value={name} onChange={e=>{setName(e.target.value);setErr("")}}
            onKeyDown={e=>e.key==="Enter"&&join()} placeholder="例：田中さん"
            style={{...inputStyle,marginTop:6}}
            onFocus={e=>e.target.style.borderColor="#4A90D9"} onBlur={e=>e.target.style.borderColor="#DDE4EE"}/>
          {err&&<p style={{margin:"6px 0 0",fontSize:12,color:"#E85D75"}}>{err}</p>}
        </div>
        <button onClick={join} disabled={loading} style={{padding:"12px",background:"#52B788",color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          {loading ? <Spinner/> : "参加する →"}
        </button>
      </div>
    </div>
  );
}

// ── InviteModal ───────────────────────────────────────────────────
function InviteModal({ members, invites, onClose, onRefresh }) {
  const [copied, setCopied] = useState(null);
  const [loading, setLoading] = useState(false);
  const canInvite = members.length < 3;

  const createAndCopy = async () => {
    setLoading(true);
    const id = "inv" + Date.now();
    await sb.from("invites").insert({ id, status:"pending" });
    const link = getInviteLink(id);
    navigator.clipboard.writeText(link).catch(()=>{});
    setCopied(id);
    setTimeout(()=>setCopied(null), 3000);
    setLoading(false);
    onRefresh();
  };

  const copyLink = (inv) => {
    navigator.clipboard.writeText(getInviteLink(inv.id)).catch(()=>{});
    setCopied(inv.id);
    setTimeout(()=>setCopied(null), 3000);
  };

  const removeMember = async (id) => {
    await sb.from("members").delete().eq("id", id);
    onRefresh();
  };

  const removeInvite = async (id) => {
    await sb.from("invites").delete().eq("id", id);
    onRefresh();
  };

  const pendingInvites = invites.filter(i=>i.status==="pending");

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(10,20,40,0.4)",zIndex:300,
      display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(3px)"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{
        background:"#fff",borderRadius:18,width:"min(95vw,480px)",maxHeight:"85vh",overflowY:"auto",
        padding:"28px",boxShadow:"0 24px 60px rgba(0,0,0,0.16)",display:"flex",flexDirection:"column",gap:22}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <h2 style={{margin:0,fontSize:16,fontWeight:800,color:"#1A2840"}}>メンバー管理</h2>
            <p style={{margin:"2px 0 0",fontSize:12,color:"#8898AA"}}>合計3名まで（あなた含む）</p>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"#8898AA",fontSize:22,lineHeight:1}}>×</button>
        </div>

        <div>
          <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:"#8898AA",letterSpacing:".06em",textTransform:"uppercase"}}>現在のメンバー（{members.length}/3）</p>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {members.map(m=>(
              <div key={m.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",background:"#F7F9FC",borderRadius:10}}>
                <Avatar user={m} size={36} ring/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#1A2840"}}>{m.name}</div>
                  <div style={{fontSize:11,color:"#8898AA"}}>{m.role==="owner"?"オーナー（あなた）":"招待メンバー"}</div>
                </div>
                <span style={{fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:10,
                  background:m.role==="owner"?"#1A2840":"#EDF0F5",color:m.role==="owner"?"#fff":"#6B7A90"}}>
                  {m.role==="owner"?"オーナー":"メンバー"}
                </span>
                {m.role!=="owner"&&(
                  <button onClick={()=>removeMember(m.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#C0CCDA",fontSize:15,padding:2,transition:"color .15s"}}
                    onMouseEnter={e=>e.target.style.color="#E85D75"} onMouseLeave={e=>e.target.style.color="#C0CCDA"}>✕</button>
                )}
              </div>
            ))}
          </div>
        </div>

        {pendingInvites.length>0&&(
          <div>
            <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:"#8898AA",letterSpacing:".06em",textTransform:"uppercase"}}>招待リンク（未使用）</p>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {pendingInvites.map(inv=>(
                <div key={inv.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:"#FFFBEE",border:"1px solid #F5E8C0",borderRadius:10}}>
                  <span style={{fontSize:16}}>🔗</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:600,color:"#6B5000"}}>招待リンク</div>
                    <div style={{fontSize:10,color:"#B09040"}}>{formatDateTime(inv.created_at)} 作成</div>
                  </div>
                  <button onClick={()=>copyLink(inv)} style={{
                    padding:"5px 12px",background:copied===inv.id?"#52B788":"#1A2840",color:"#fff",
                    border:"none",borderRadius:7,cursor:"pointer",fontSize:12,fontWeight:600,transition:"background .2s",whiteSpace:"nowrap"}}>
                    {copied===inv.id?"コピー済 ✓":"リンクをコピー"}
                  </button>
                  <button onClick={()=>removeInvite(inv.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#C0CCDA",fontSize:14,padding:2,transition:"color .15s"}}
                    onMouseEnter={e=>e.target.style.color="#E85D75"} onMouseLeave={e=>e.target.style.color="#C0CCDA"}>✕</button>
                </div>
              ))}
            </div>
          </div>
        )}

        {canInvite ? (
          <div style={{background:"#F7F9FC",borderRadius:12,padding:"16px"}}>
            <p style={{margin:"0 0 6px",fontSize:13,fontWeight:700,color:"#1A2840"}}>新しい招待リンクを作成</p>
            <p style={{margin:"0 0 14px",fontSize:12,color:"#6B7A90",lineHeight:1.6}}>
              リンクを作成してLINEやSlackで送ってください。リンクを開いた相手が名前を入力するとメンバーに追加されます。
            </p>
            <button onClick={createAndCopy} disabled={loading} style={{
              width:"100%",padding:"11px",background:"#1A2840",color:"#fff",border:"none",
              borderRadius:10,fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              {loading ? <Spinner/> : <><span>🔗</span> 招待リンクを作成してコピー</>}
            </button>
          </div>
        ) : (
          <div style={{padding:"14px",background:"#F0F4F8",borderRadius:10,textAlign:"center",fontSize:13,color:"#6B7A90"}}>
            メンバーが上限（3名）に達しています
          </div>
        )}
      </div>
    </div>
  );
}

// ── IdeaModal ─────────────────────────────────────────────────────
function IdeaModal({ idea, currentUser, onClose, onSave }) {
  const [title,    setTitle]    = useState(idea?.title||"");
  const [memo,     setMemo]     = useState(idea?.memo||"");
  const [tagInput, setTagInput] = useState("");
  const [tags,     setTags]     = useState(idea?.tags||[]);
  const [color,    setColor]    = useState(idea?.color||COLORS[0]);
  const [images,   setImages]   = useState(idea?.images||[]);
  const [loading,  setLoading]  = useState(false);

  const addTag = () => { const t=tagInput.trim(); if(t&&!tags.includes(t))setTags(p=>[...p,t]); setTagInput(""); };
  const save = async () => {
    if (!title.trim()) return;
    setLoading(true);
    await onSave({ title, memo, tags, color, images });
    setLoading(false);
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(10,20,40,0.4)",zIndex:200,
      display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(3px)",animation:"fadeInFast .15s ease"}}
      onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{
        background:"#fff",borderRadius:18,width:"min(95vw,540px)",maxHeight:"90vh",overflowY:"auto",
        padding:"28px",boxShadow:"0 24px 60px rgba(0,0,0,0.16)",display:"flex",flexDirection:"column",gap:18}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <Avatar user={currentUser} size={32} ring/>
            <div>
              <h2 style={{margin:0,fontSize:15,fontWeight:800,color:"#1A2840"}}>{idea?.id?"アイデアを編集":"新しいアイデア"}</h2>
              <p style={{margin:0,fontSize:11,color:"#8898AA"}}>{currentUser.name} として投稿</p>
            </div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"#8898AA",fontSize:22,lineHeight:1}}>×</button>
        </div>

        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:11,fontWeight:700,color:"#8898AA",textTransform:"uppercase",letterSpacing:".05em"}}>カラー</span>
          {COLORS.map(c=><button key={c} onClick={()=>setColor(c)} style={{width:20,height:20,borderRadius:"50%",background:c,cursor:"pointer",border:color===c?"3px solid #1A2840":"2px solid transparent",transition:"border .15s"}}/>)}
        </div>

        <div>
          <label style={{fontSize:11,fontWeight:700,color:"#6B7A90",letterSpacing:".06em",textTransform:"uppercase"}}>タイトル</label>
          <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="アイデアのタイトル"
            style={{...inputStyle,marginTop:6,fontSize:15}}
            onFocus={e=>e.target.style.borderColor="#4A90D9"} onBlur={e=>e.target.style.borderColor="#DDE4EE"}/>
        </div>

        <div>
          <label style={{fontSize:11,fontWeight:700,color:"#6B7A90",letterSpacing:".06em",textTransform:"uppercase"}}>メモ</label>
          <textarea value={memo} onChange={e=>setMemo(e.target.value)} placeholder="詳細メモ、背景など..." rows={4}
            style={{...inputStyle,marginTop:6,resize:"vertical",lineHeight:1.6}}
            onFocus={e=>e.target.style.borderColor="#4A90D9"} onBlur={e=>e.target.style.borderColor="#DDE4EE"}/>
        </div>

        <ImageUploadZone images={images} onChange={setImages}/>

        <div>
          <label style={{fontSize:11,fontWeight:700,color:"#6B7A90",letterSpacing:".06em",textTransform:"uppercase"}}>タグ</label>
          <div style={{display:"flex",gap:8,marginTop:6}}>
            <input value={tagInput} onChange={e=>setTagInput(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&addTag()} placeholder="タグを追加 (Enter)"
              style={{...inputStyle,flex:1,fontSize:13}}
              onFocus={e=>e.target.style.borderColor="#4A90D9"} onBlur={e=>e.target.style.borderColor="#DDE4EE"}/>
            <button onClick={addTag} style={{padding:"9px 14px",background:"#F0F4F8",border:"1.5px solid #DDE4EE",borderRadius:8,cursor:"pointer",fontSize:13,color:"#4A6080",fontFamily:"inherit"}}>追加</button>
          </div>
          {tags.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:10}}>{tags.map(t=><TagBadge key={t} tag={t} onRemove={()=>setTags(tags.filter(x=>x!==t))}/>)}</div>}
        </div>

        <button onClick={save} disabled={loading} style={{padding:"11px",background:"#1A2840",color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          {loading ? <Spinner/> : "保存する"}
        </button>
      </div>
    </div>
  );
}

// ── IdeaCard ──────────────────────────────────────────────────────
function IdeaCard({ idea, members, onClick, onDelete }) {
  const author = members.find(u=>u.id===idea.author_id);
  const [lb, setLb] = useState(null);
  const firstImg = idea.images?.[0];
  return (
    <>
      {lb&&<Lightbox src={lb} onClose={()=>setLb(null)}/>}
      <div onClick={onClick} style={{background:"#fff",borderRadius:12,border:"1.5px solid #EDF0F5",cursor:"pointer",
        transition:"transform .15s, box-shadow .15s",overflow:"hidden",display:"flex",flexDirection:"column"}}
        onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 8px 24px rgba(0,0,0,0.08)"}}
        onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="none"}}>
        <div style={{height:4,background:idea.color||"#4A90D9",flexShrink:0}}/>
        {firstImg&&(
          <div onClick={e=>{e.stopPropagation();setLb(firstImg.src)}} style={{height:130,overflow:"hidden",cursor:"zoom-in",position:"relative"}}>
            <img src={firstImg.src} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
            {idea.images.length>1&&<div style={{position:"absolute",bottom:6,right:6,background:"rgba(0,0,0,0.55)",color:"#fff",borderRadius:6,padding:"2px 7px",fontSize:11,fontWeight:600}}>+{idea.images.length-1}</div>}
          </div>
        )}
        <div style={{padding:"14px 14px 12px",display:"flex",flexDirection:"column",gap:7,flex:1}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
            <h3 style={{margin:0,fontSize:14,fontWeight:700,color:"#1A2840",lineHeight:1.4}}>{idea.title}</h3>
            <button onClick={e=>{e.stopPropagation();onDelete(idea.id)}} style={{background:"none",border:"none",cursor:"pointer",color:"#C0CCDA",fontSize:14,lineHeight:1,padding:2,flexShrink:0,transition:"color .15s"}}
              onMouseEnter={e=>e.target.style.color="#E85D75"} onMouseLeave={e=>e.target.style.color="#C0CCDA"}>✕</button>
          </div>
          {idea.memo&&<p style={{margin:0,fontSize:12,color:"#6B7A90",lineHeight:1.6,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{idea.memo}</p>}
          <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:2}}>
            {(idea.tags||[]).map(t=><TagBadge key={t} tag={t} small/>)}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:7,marginTop:4,paddingTop:8,borderTop:"1px solid #F0F4F8"}}>
            {author&&<Avatar user={author} size={20}/>}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:11,fontWeight:600,color:"#4A6080",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{author?.name||"不明"}</div>
              <div style={{fontSize:10,color:"#B0BCC8"}}>{formatDateTime(idea.created_at)}</div>
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

// ── App ───────────────────────────────────────────────────────────
function App() {
  const [members,  setMembers]  = useState([]);
  const [ideas,    setIdeas]    = useState([]);
  const [invites,  setInvites]  = useState([]);
  const [session,  setSession]  = useState(null);
  const [loading,  setLoading]  = useState(true);
  const [joinInviteId, setJoinInviteId] = useState(null);

  const [search,       setSearch]       = useState("");
  const [activeTag,    setActiveTag]    = useState(null);
  const [filterAuthor, setFilterAuthor] = useState(null);
  const [ideaModal,    setIdeaModal]    = useState(null);
  const [showInvite,   setShowInvite]   = useState(false);
  const [userMenuOpen, setUserMenuOpen] = useState(false);

  // Check URL for invite token
  useEffect(()=>{
    const params = new URLSearchParams(window.location.search);
    const tok = params.get("invite");
    if (tok) {
      const id = idFromToken(tok);
      setJoinInviteId(id);
      window.history.replaceState({}, "", window.location.pathname);
    }
  },[]);

  const fetchAll = useCallback(async () => {
    const [{ data: m }, { data: id }, { data: inv }] = await Promise.all([
      sb.from("members").select("*").order("joined_at"),
      sb.from("ideas").select("*").order("created_at", { ascending: false }),
      sb.from("invites").select("*").order("created_at"),
    ]);
    setMembers(m||[]);
    setIdeas(id||[]);
    setInvites(inv||[]);
  },[]);

  // Init: load data + resolve session
  useEffect(()=>{
    (async()=>{
      await fetchAll();
      const sid = store.get(SK_SESSION, null);
      if (sid) {
        const { data: m } = await sb.from("members").select("*").eq("id", sid).single();
        if (m) setSession(m);
        else { store.set(SK_SESSION, "u1"); const { data: owner } = await sb.from("members").select("*").eq("id","u1").single(); setSession(owner); }
      } else {
        store.set(SK_SESSION, "u1");
        const { data: owner } = await sb.from("members").select("*").eq("id","u1").single();
        setSession(owner);
      }
      setLoading(false);
    })();
  },[]);

  // Realtime subscription
  useEffect(()=>{
    const ch = sb.channel("realtime-all")
      .on("postgres_changes",{event:"*",schema:"public",table:"members"},()=>fetchAll())
      .on("postgres_changes",{event:"*",schema:"public",table:"ideas"},()=>fetchAll())
      .on("postgres_changes",{event:"*",schema:"public",table:"invites"},()=>fetchAll())
      .subscribe();
    return ()=>sb.removeChannel(ch);
  },[fetchAll]);

  const saveIdea = async (data) => {
    if (ideaModal?.id) {
      await sb.from("ideas").update({ title:data.title, memo:data.memo, tags:data.tags, color:data.color, images:data.images }).eq("id", ideaModal.id);
    } else {
      await sb.from("ideas").insert({ id:Date.now(), title:data.title, memo:data.memo, tags:data.tags, color:data.color, images:data.images, author_id:session.id });
    }
    setIdeaModal(null);
    fetchAll();
  };

  const deleteIdea = async (id) => {
    await sb.from("ideas").delete().eq("id", id);
    fetchAll();
  };

  const logout = () => { store.set(SK_SESSION,"u1"); setSession(members.find(m=>m.id==="u1")||session); setUserMenuOpen(false); };

  const allTags  = useMemo(()=>{const s=new Set();ideas.forEach(i=>(i.tags||[]).forEach(t=>s.add(t)));return[...s];},[ideas]);
  const filtered = useMemo(()=>ideas.filter(idea=>{
    const q=search.toLowerCase();
    return (!q||idea.title.toLowerCase().includes(q)||(idea.memo||"").toLowerCase().includes(q)||(idea.tags||[]).some(t=>t.toLowerCase().includes(q)))
      &&(!activeTag||(idea.tags||[]).includes(activeTag))
      &&(!filterAuthor||idea.author_id===filterAuthor);
  }),[ideas,search,activeTag,filterAuthor]);

  if (loading) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,background:"#F7F9FC"}}>
      <div style={{width:36,height:36,background:"#1A2840",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>💡</div>
      <Spinner/>
    </div>
  );

  if (joinInviteId) return <JoinScreen inviteId={joinInviteId} onJoin={()=>{ setJoinInviteId(null); fetchAll(); const sid=store.get(SK_SESSION,null); if(sid){sb.from("members").select("*").eq("id",sid).single().then(({data})=>{ if(data)setSession(data); }); } }}/>;

  if (!session) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><Spinner/></div>;

  return (
    <div style={{minHeight:"100vh",background:"#F7F9FC"}}>

      {/* Header */}
      <header style={{background:"#fff",borderBottom:"1.5px solid #EDF0F5",padding:"0 18px",position:"sticky",top:0,zIndex:50,display:"flex",alignItems:"center",gap:12,height:56}}>
        <div style={{display:"flex",alignItems:"center",gap:8,minWidth:130}}>
          <div style={{width:28,height:28,background:"#1A2840",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>💡</div>
          <span style={{fontWeight:800,fontSize:15,color:"#1A2840",letterSpacing:"-.02em"}}>IdeaStock</span>
        </div>

        <div style={{flex:1,position:"relative",maxWidth:380}}>
          <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"#B0BCC8",fontSize:13,pointerEvents:"none"}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="検索..."
            style={{width:"100%",padding:"7px 12px 7px 30px",border:"1.5px solid #DDE4EE",borderRadius:8,fontSize:13,outline:"none",fontFamily:"inherit",background:"#F7F9FC",transition:"all .15s",color:"#1A2840"}}
            onFocus={e=>{e.target.style.borderColor="#4A90D9";e.target.style.background="#fff"}}
            onBlur={e=>{e.target.style.borderColor="#DDE4EE";e.target.style.background="#F7F9FC"}}/>
        </div>

        <div style={{display:"flex",gap:4,alignItems:"center"}}>
          {members.map(u=>(
            <button key={u.id} onClick={()=>setFilterAuthor(filterAuthor===u.id?null:u.id)} title={u.name}
              style={{width:28,height:28,borderRadius:"50%",border:`2px solid ${filterAuthor===u.id?u.color:"transparent"}`,
                background:filterAuthor===u.id?u.color+"28":"#F0F4F8",cursor:"pointer",fontSize:14,transition:"all .15s",display:"flex",alignItems:"center",justifyContent:"center"}}>
              {u.avatar}
            </button>
          ))}
        </div>

        <button onClick={()=>setIdeaModal("new")} style={{padding:"7px 14px",background:"#1A2840",color:"#fff",border:"none",borderRadius:9,fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap",transition:"background .15s"}}
          onMouseEnter={e=>e.currentTarget.style.background="#2A4060"} onMouseLeave={e=>e.currentTarget.style.background="#1A2840"}>
          <span style={{fontSize:15}}>＋</span> 新しいアイデア
        </button>

        <div style={{position:"relative"}}>
          <button onClick={()=>setUserMenuOpen(o=>!o)} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 10px 4px 5px",border:"1.5px solid #DDE4EE",borderRadius:20,background:"#fff",cursor:"pointer",transition:"border-color .15s"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor="#4A90D9"} onMouseLeave={e=>e.currentTarget.style.borderColor="#DDE4EE"}>
            <Avatar user={session} size={22} ring/>
            <span style={{fontSize:12,fontWeight:600,color:"#1A2840",maxWidth:80,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{session.name}</span>
            <span style={{fontSize:9,color:"#B0BCC8"}}>▾</span>
          </button>
          {userMenuOpen&&(
            <div style={{position:"absolute",right:0,top:"calc(100% + 6px)",background:"#fff",border:"1.5px solid #DDE4EE",borderRadius:12,padding:"6px",boxShadow:"0 8px 24px rgba(0,0,0,0.1)",zIndex:100,minWidth:190,animation:"fadeInFast .1s ease"}}>
              <div style={{padding:"8px 10px 10px",borderBottom:"1px solid #F0F4F8",marginBottom:4}}>
                <div style={{fontSize:12,fontWeight:700,color:"#1A2840"}}>{session.name}</div>
                <div style={{fontSize:11,color:"#8898AA"}}>{session.role==="owner"?"オーナー":"メンバー"}</div>
              </div>
              <button onClick={()=>{setShowInvite(true);setUserMenuOpen(false)}} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"8px 10px",background:"transparent",border:"none",borderRadius:8,cursor:"pointer",fontFamily:"inherit",transition:"background .1s"}}
                onMouseEnter={e=>e.currentTarget.style.background="#F0F4F8"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <span style={{fontSize:14}}>👥</span>
                <span style={{fontSize:13,color:"#1A2840"}}>メンバー招待・管理</span>
              </button>
              {session.role!=="owner"&&(
                <button onClick={logout} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"8px 10px",background:"transparent",border:"none",borderRadius:8,cursor:"pointer",fontFamily:"inherit",transition:"background .1s"}}
                  onMouseEnter={e=>e.currentTarget.style.background="#FFF0F0"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <span style={{fontSize:14}}>🚪</span>
                  <span style={{fontSize:13,color:"#E85D75"}}>ログアウト</span>
                </button>
              )}
            </div>
          )}
        </div>
      </header>

      <div style={{display:"flex",maxWidth:1120,margin:"0 auto",padding:"22px 16px",gap:24}}>
        {/* Sidebar */}
        <aside style={{width:168,flexShrink:0}}>
          <p style={{margin:"0 0 7px 3px",fontSize:10,fontWeight:700,color:"#8898AA",letterSpacing:".08em",textTransform:"uppercase"}}>タグ</p>
          <div style={{display:"flex",flexDirection:"column",gap:2}}>
            <button onClick={()=>setActiveTag(null)} style={{padding:"6px 10px",borderRadius:7,border:"none",cursor:"pointer",textAlign:"left",background:!activeTag?"#1A2840":"transparent",color:!activeTag?"#fff":"#4A6080",fontSize:13,fontWeight:500,fontFamily:"inherit",transition:"all .15s"}}>
              すべて <span style={{color:!activeTag?"#88A0C0":"#B0BCC8",fontSize:12}}>({ideas.length})</span>
            </button>
            {allTags.map(tag=>(
              <button key={tag} onClick={()=>setActiveTag(tag===activeTag?null:tag)} style={{padding:"6px 10px",borderRadius:7,border:"none",cursor:"pointer",textAlign:"left",background:activeTag===tag?"#EEF2FF":"transparent",color:activeTag===tag?"#4A90D9":"#4A6080",fontSize:13,fontWeight:activeTag===tag?600:500,fontFamily:"inherit",transition:"all .15s"}}>
                # {tag}
              </button>
            ))}
          </div>
          <div style={{marginTop:22}}>
            <p style={{margin:"0 0 7px 3px",fontSize:10,fontWeight:700,color:"#8898AA",letterSpacing:".08em",textTransform:"uppercase"}}>メンバー</p>
            {members.map(u=>{
              const count=ideas.filter(i=>i.author_id===u.id).length;
              return (
                <div key={u.id} style={{display:"flex",alignItems:"center",gap:7,padding:"5px 4px",borderRadius:7}}>
                  <Avatar user={u} size={20}/>
                  <span style={{fontSize:12,color:"#4A6080",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.name}</span>
                  <span style={{fontSize:11,color:"#B0BCC8"}}>{count}</span>
                </div>
              );
            })}
          </div>
        </aside>

        {/* Main */}
        <main style={{flex:1}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <p style={{margin:0,fontSize:13,color:"#8898AA"}}>
              {filtered.length} 件
              {activeTag&&<span style={{marginLeft:6,color:"#4A90D9",fontWeight:600}}>#{activeTag}</span>}
              {filterAuthor&&<span style={{marginLeft:6,color:members.find(u=>u.id===filterAuthor)?.color,fontWeight:600}}>{members.find(u=>u.id===filterAuthor)?.name}</span>}
            </p>
          </div>
          {filtered.length===0 ? (
            <div style={{textAlign:"center",padding:"60px 20px",color:"#B0BCC8"}}>
              <div style={{fontSize:38,marginBottom:10}}>🔍</div>
              <p style={{margin:0,fontSize:14}}>アイデアが見つかりません</p>
            </div>
          ) : (
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(230px,1fr))",gap:13}}>
              {filtered.map(idea=>(
                <IdeaCard key={idea.id} idea={idea} members={members} onClick={()=>setIdeaModal(idea)} onDelete={deleteIdea}/>
              ))}
            </div>
          )}
        </main>
      </div>

      {ideaModal  && <IdeaModal idea={ideaModal==="new"?null:ideaModal} currentUser={session} onClose={()=>setIdeaModal(null)} onSave={saveIdea}/>}
      {showInvite && <InviteModal members={members} invites={invites} onClose={()=>setShowInvite(false)} onRefresh={fetchAll}/>}
      {userMenuOpen && <div onClick={()=>setUserMenuOpen(false)} style={{position:"fixed",inset:0,zIndex:49}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
